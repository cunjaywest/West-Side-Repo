<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>West Highland Ride</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  :root{
    --void:#070809; --panel:rgba(9,10,12,.94);
    --glass:rgba(20,22,27,.62); --glass-strong:rgba(15,17,21,.8);
    --card:rgba(255,255,255,.045); --card-hair:rgba(255,255,255,.09);
    --hair:rgba(255,255,255,.08); --hair-2:rgba(255,255,255,.14);
    --text:#f3f5f8; --dim:#98a0ab; --faint:#5c636e;
    --aurora:#5fe9c6; --aurora-2:#43cfab;
    --d1:#5fe9c6; --d2:#5fe9c6; --d3:#5fe9c6;
    --blur:blur(24px) saturate(1.6);
    --font:-apple-system,"SF Pro Display","SF Pro Text",system-ui,"Segoe UI",Roboto,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden}
  body{font-family:var(--font); color:var(--text); background:var(--void); height:100dvh; position:relative; overflow:hidden}
  ::selection{background:rgba(95,233,198,.3)}

  /* Ambient aurora */
  .aurora{position:absolute; top:-140px; left:-10%; right:-10%; height:340px; z-index:2; pointer-events:none;
    background:radial-gradient(60% 100% at 30% 0%, rgba(95,233,198,.16), transparent 70%),
               radial-gradient(55% 100% at 75% 10%, rgba(116,186,255,.13), transparent 72%),
               radial-gradient(50% 100% at 55% 0%, rgba(155,140,255,.10), transparent 70%);
    filter:blur(24px); animation:drift 22s ease-in-out infinite alternate}
  @keyframes drift{from{transform:translateX(-16px) scaleY(1)} to{transform:translateX(20px) scaleY(1.12)}}
  @media (prefers-reduced-motion:reduce){.aurora{animation:none}}

  #map{position:absolute; inset:0; z-index:1; background:#0a0c0e}
  .leaflet-container{font-family:var(--font); background:#0a0c0e}
  .leaflet-tile-pane{filter:invert(1) grayscale(1) brightness(.92) contrast(.95)}
  .leaflet-control-attribution{background:rgba(8,9,11,.55)!important; color:var(--faint)!important;
    -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); border-radius:8px 0 0 0; font-size:9px; padding:2px 6px}
  .leaflet-control-attribution a{color:var(--dim)!important}

  /* Glowing pins */
  .pin{position:relative; width:30px; height:30px}
  .pin .halo{position:absolute; inset:-7px; border-radius:50%; background:radial-gradient(circle, var(--dc) 0%, transparent 68%); opacity:.4; filter:blur(4px)}
  .pin .core{position:absolute; inset:0; border-radius:50%; background:rgba(10,12,14,.85); border:1.5px solid var(--dc);
    box-shadow:0 0 12px var(--dc), inset 0 0 7px rgba(255,255,255,.05); display:flex; align-items:center; justify-content:center;
    -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px)}
  .pin .core span{font-size:14px; line-height:1}
  .pin.d1{--dc:var(--d1)} .pin.d2{--dc:var(--d2)} .pin.d3{--dc:var(--d3)}

  /* Top glass card */
  .topbar{position:absolute; top:calc(env(safe-area-inset-top) + 8px); left:10px; right:10px; z-index:500;
    background:var(--glass); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    border:1px solid var(--hair); border-radius:22px; padding:12px 14px 11px; box-shadow:0 14px 40px rgba(0,0,0,.5)}
  .tb-row{display:flex; align-items:center; justify-content:space-between; gap:10px}
  .brand{min-width:0}
  .brand h1{font-size:16.5px; font-weight:600; letter-spacing:-.02em; margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .brand .sub{font-size:9.5px; font-family:var(--mono); letter-spacing:.14em; color:var(--faint); text-transform:uppercase; margin-top:2px}
  .icon-btn{background:rgba(255,255,255,.05); border:1px solid var(--hair-2); color:var(--dim); border-radius:11px;
    width:36px; height:36px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex:0 0 auto}
  .icon-btn:active{background:rgba(255,255,255,.12)}
  .icon-btn svg{width:18px; height:18px}

  .days{display:flex; gap:4px; margin-top:11px; background:rgba(255,255,255,.045); border-radius:13px; padding:4px}
  .day-seg{flex:1; border:none; cursor:pointer; border-radius:10px; padding:7px 4px; background:transparent; color:var(--dim);
    font-family:var(--font); font-size:12px; font-weight:600; letter-spacing:-.01em; display:flex; align-items:center; justify-content:center; gap:6px; transition:.18s}
  .day-seg .dot{width:6px; height:6px; border-radius:50%; background:currentColor; opacity:.5; transition:.18s}
  .day-seg[data-day="1"] .dot{background:var(--d1)} .day-seg[data-day="2"] .dot{background:var(--d2)} .day-seg[data-day="3"] .dot{background:var(--d3)}
  .day-seg[data-day="all"] .dot{background:var(--aurora)}
  .day-seg.active{background:rgba(255,255,255,.10); color:var(--text)}
  .day-seg.active .dot{opacity:1; box-shadow:0 0 8px currentColor}

  /* FAB */
  .fab{position:absolute; right:16px; bottom:calc(env(safe-area-inset-bottom) + 92px); z-index:540;
    width:54px; height:54px; border-radius:18px; border:none; cursor:pointer;
    background:linear-gradient(160deg,#74f0d4,#3ec7a6); color:#04140f;
    box-shadow:0 8px 30px rgba(79,214,180,.4), inset 0 1px 0 rgba(255,255,255,.4);
    display:flex; align-items:center; justify-content:center; transition:.15s}
  .fab svg{width:24px; height:24px}
  .fab:active{transform:scale(.94)}
  .fab.armed{background:var(--glass-strong); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    border:1px solid var(--hair-2); color:var(--text); box-shadow:0 8px 30px rgba(0,0,0,.5)}

  .addhint{position:absolute; top:calc(env(safe-area-inset-top) + 118px); left:50%; transform:translateX(-50%); z-index:540;
    background:var(--glass-strong); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    border:1px solid var(--hair-2); color:var(--text); padding:9px 14px; border-radius:999px; font-size:13px; font-weight:500;
    box-shadow:0 10px 30px rgba(0,0,0,.5); display:none; align-items:center; gap:9px; white-space:nowrap}
  .addhint.show{display:flex}
  .addhint .x{background:rgba(255,255,255,.12); border:none; color:var(--text); border-radius:50%; width:19px; height:19px; font-size:12px; cursor:pointer; line-height:1}

  /* Panels */
  .panel{position:absolute; inset:0; z-index:650; background:var(--panel); -webkit-backdrop-filter:blur(30px); backdrop-filter:blur(30px);
    transform:translateY(100%); transition:transform .34s cubic-bezier(.32,.72,0,1); display:flex; flex-direction:column; overflow:hidden}
  .panel.open{transform:translateY(0)}
  .panel-head{padding:calc(env(safe-area-inset-top) + 16px) 18px 14px; display:flex; align-items:center; justify-content:space-between; flex:0 0 auto; border-bottom:1px solid var(--hair)}
  .panel-head h2{font-size:22px; font-weight:600; letter-spacing:-.025em; margin:0}
  .panel-body{overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px 16px calc(env(safe-area-inset-bottom) + 108px); flex:1 1 auto}

  .daygroup{margin-bottom:22px}
  .daygroup h3{font-size:11px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); margin:0 0 10px; display:flex; align-items:center; gap:9px}
  .daygroup h3 .bar{width:20px; height:3px; border-radius:2px; box-shadow:0 0 8px currentColor}
  .bar.d1{background:var(--d1); color:var(--d1)} .bar.d2{background:var(--d2); color:var(--d2)} .bar.d3{background:var(--d3); color:var(--d3)}
  .note-card{background:none; border:none; border-bottom:1px solid var(--hair); border-radius:0; padding:13px 2px; margin:0; cursor:pointer; display:flex; gap:12px; transition:.15s; position:relative}
  .note-card:last-child{border-bottom:none}
  .note-card.d1,.note-card.d2,.note-card.d3{--dc:var(--aurora)}
  .note-card:active{background:rgba(255,255,255,.03)}
  .note-card .em{font-size:18px; flex:0 0 auto; line-height:1.3}
  .note-card .cat{font-size:10px; color:var(--faint); font-family:var(--mono); text-transform:uppercase; letter-spacing:.1em}
  .note-card .tt{font-weight:600; font-size:15px; letter-spacing:-.01em; margin:1px 0 3px}
  .note-card .bd{font-size:13px; color:var(--dim); margin:0; line-height:1.4}
  .empty{text-align:center; color:var(--faint); font-size:14px; padding:48px 20px; line-height:1.6}

  /* Trip */
  .sec-title{font-size:13px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); margin:6px 2px 12px}
  .sched{background:var(--card); border:1px solid var(--card-hair); border-radius:16px; padding:14px 15px; margin-bottom:10px; position:relative; overflow:hidden}
  .sched::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--dc); box-shadow:0 0 10px var(--dc)}
  .sched.d1{--dc:var(--d1)} .sched.d2{--dc:var(--d2)} .sched.d3{--dc:var(--d3)} .sched.travel{--dc:var(--aurora)}
  .sched .day{font-size:10px; font-family:var(--mono); letter-spacing:.12em; text-transform:uppercase; color:var(--faint)}
  .sched .leg{font-weight:600; font-size:17px; letter-spacing:-.02em; margin:3px 0 8px}
  .sched .meta{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:9px}
  .sched .tag{font-size:11px; font-family:var(--mono); background:rgba(255,255,255,.06); border:1px solid var(--hair); border-radius:7px; padding:3px 8px; color:var(--dim)}
  .sched ul{margin:0; padding-left:16px}
  .sched li{font-size:13.5px; color:var(--dim); line-height:1.55}
  .bud-cat{font-size:11px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); margin:20px 2px 8px; display:flex; justify-content:space-between}
  .bud-cat span:last-child{font-family:var(--mono); color:var(--aurora)}
  .bud-row{display:flex; justify-content:space-between; align-items:center; background:var(--card); border:1px solid var(--card-hair); border-radius:12px; padding:12px 14px; margin-bottom:6px; font-size:14px}
  .bud-row .amt{font-family:var(--mono); color:var(--dim)}
  .bud-total{display:flex; justify-content:space-between; align-items:center; margin-top:18px; padding:16px 16px; border-radius:16px;
    background:linear-gradient(150deg, rgba(95,233,198,.14), rgba(67,207,171,.05)); border:1px solid rgba(95,233,198,.28);
    box-shadow:0 0 30px rgba(95,233,198,.1); font-weight:600; font-size:17px; letter-spacing:-.01em}
  .bud-total .amt{font-family:var(--mono); color:var(--aurora)}

  /* Kit */
  .kit-progress{background:none; border:none; border-radius:0; padding:4px 2px 14px; margin-bottom:6px}
  .kit-progress .lbl{display:flex; justify-content:space-between; font-size:13px; font-weight:600; margin-bottom:10px}
  .kit-progress .lbl span:last-child{font-family:var(--mono); color:var(--aurora)}
  .bar-track{height:7px; background:rgba(255,255,255,.07); border-radius:4px; overflow:hidden}
  .bar-fill{height:100%; background:linear-gradient(90deg,#43cfab,#74f0d4); border-radius:4px; box-shadow:0 0 12px rgba(95,233,198,.6); transition:width .35s}
  .kit-cat{font-size:11px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); margin:20px 2px 9px}
  .kit-item{display:flex; align-items:center; gap:12px; background:none; border:none; border-bottom:1px solid var(--hair); border-radius:0; padding:13px 2px; margin:0; transition:.15s}
  .kit-item input[type=checkbox]{appearance:none; -webkit-appearance:none; width:20px; height:20px; border-radius:6px; border:1.5px solid var(--hair-2); background:rgba(255,255,255,.03); flex:0 0 auto; cursor:pointer; position:relative; transition:.15s}
  .kit-item input[type=checkbox]:checked{background:var(--aurora); border-color:transparent; box-shadow:0 0 12px rgba(95,233,198,.5)}
  .kit-item input[type=checkbox]:checked::after{content:""; position:absolute; left:6.5px; top:2.5px; width:5px; height:10px; border:solid #04140f; border-width:0 2.5px 2.5px 0; transform:rotate(45deg)}
  .kit-item label{flex:1; font-size:15px; cursor:pointer; letter-spacing:-.01em}
  .kit-item.done label{color:var(--faint); text-decoration:line-through}
  .kit-item .del{background:none; border:none; color:#ff8b7a; opacity:.55; font-size:15px; cursor:pointer; padding:2px 4px}
  .kit-add{display:flex; gap:8px; margin-top:12px}
  .kit-add input{flex:1; border:1px solid var(--hair-2); border-radius:12px; padding:12px 13px; font-size:15px; font-family:var(--font); background:rgba(255,255,255,.04); color:var(--text)}
  .kit-add select{border:1px solid var(--hair-2); border-radius:12px; padding:0 8px; font-size:12px; background:#15181d; color:var(--dim)}
  .kit-add button{background:rgba(95,233,198,.14); color:var(--aurora); border:1px solid rgba(95,233,198,.3); border-radius:12px; padding:0 16px; font-weight:600; cursor:pointer}

  /* Trek Star — sized wireframe, scrollable list, pinned toggle */
  .bike-body{display:flex; flex-direction:column; height:100%; padding:0; overflow:hidden}
  .bike-stage{position:relative; flex:0 0 auto; height:50vh; min-height:260px; overflow:hidden; touch-action:none; margin-top:env(safe-area-inset-top)}
  .bike-stage::before{content:""; position:absolute; left:-10%; right:-10%; bottom:6%; height:48%; pointer-events:none;
    background-image:linear-gradient(rgba(95,233,198,.4) 1px, transparent 1px), linear-gradient(90deg, rgba(95,233,198,.4) 1px, transparent 1px);
    background-size:32px 32px; transform:perspective(240px) rotateX(63deg); transform-origin:bottom;
    -webkit-mask-image:linear-gradient(to top, rgba(0,0,0,.6), transparent 82%); mask-image:linear-gradient(to top, rgba(0,0,0,.6), transparent 82%);
    opacity:.4}
  .bike-stage::after{content:""; position:absolute; inset:0; pointer-events:none; opacity:.5;
    background:repeating-linear-gradient(to bottom, rgba(255,255,255,.025) 0px, rgba(255,255,255,.025) 1px, transparent 1px, transparent 3px)}
  #bikeCanvas{position:relative; z-index:1; width:100%; height:100%; display:block;
    filter:drop-shadow(0 0 5px rgba(95,233,198,.55)) drop-shadow(0 0 18px rgba(95,233,198,.3))}
  .bike-stage.cost #bikeCanvas{filter:drop-shadow(0 0 5px rgba(124,255,107,.55)) drop-shadow(0 0 18px rgba(124,255,107,.3))}
  /* HUD — weapon inspection readout */
  .hud{position:absolute; inset:0; z-index:2; pointer-events:none; font-family:var(--mono); --hud:var(--aurora)}
  .bike-stage.cost .hud{--hud:#7cff6b}
  .hud-tl{position:absolute; top:12px; left:14px}
  .hud-mode{font-size:9.5px; letter-spacing:.22em; color:var(--dim)}
  .hud-mode::before{content:"\25B8 "; color:var(--hud)}
  .hud-total{font-size:30px; font-weight:600; letter-spacing:-.01em; color:var(--hud); line-height:1.05; margin-top:2px; text-shadow:0 0 14px currentColor; font-family:var(--font)}
  .hud-sub{font-size:9px; letter-spacing:.16em; color:var(--faint); margin-top:3px}
  .hud-list{position:absolute; top:12px; right:14px; text-align:right; display:flex; flex-direction:column; gap:3px; max-width:52%}
  .hud-line{font-size:9px; letter-spacing:.08em; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .hud-line b{color:var(--hud); font-weight:600; margin-left:6px}
  .reticle{position:absolute; width:14px; height:14px; border:1.5px solid var(--hud); opacity:.5}
  .reticle.tl{top:8px; left:8px; border-right:0; border-bottom:0}
  .reticle.tr{top:8px; right:8px; border-left:0; border-bottom:0}
  .reticle.bl{bottom:8px; left:8px; border-right:0; border-top:0}
  .reticle.br{bottom:8px; right:8px; border-left:0; border-top:0}
  .bike-caption{position:absolute; z-index:2; left:14px; bottom:12px; font-family:var(--mono); font-size:9.5px; letter-spacing:.14em; color:var(--faint); text-transform:uppercase; pointer-events:none}
  .bike-hint{position:absolute; z-index:2; right:14px; bottom:12px; font-size:9px; color:var(--faint); font-family:var(--mono); letter-spacing:.1em; text-transform:uppercase; pointer-events:none}
  /* Scroll list + pinned dock */
  .build-scroll{flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:6px 16px 10px}
  .bike-dock{flex:0 0 auto; padding:12px 16px calc(env(safe-area-inset-bottom) + 82px); background:var(--panel); border-top:1px solid var(--hair)}
  /* Mode toggle */
  .mode-toggle{display:flex; gap:4px; background:rgba(255,255,255,.045); border-radius:12px; padding:4px; margin:0}
  .mode-toggle button{flex:1; border:none; cursor:pointer; border-radius:9px; padding:10px 4px; background:transparent; color:var(--dim); font-family:var(--font); font-size:13px; font-weight:600; letter-spacing:-.01em; transition:.15s}
  .mode-toggle button.active{background:rgba(255,255,255,.10); color:var(--text)}
  .mode-toggle button[data-mode="cost"].active{color:#7cff6b}
  /* Build rows */
  .build-list{display:flex; flex-direction:column}
  .build-row{display:flex; align-items:center; gap:12px; padding:13px 4px; border-bottom:1px solid var(--hair); cursor:pointer}
  .build-row:last-child{border-bottom:none}
  .build-row .check{width:20px; height:20px; flex:0 0 auto; border-radius:6px; border:1.5px solid var(--hair-2); position:relative; transition:.15s}
  .build-row.on .check{background:var(--rc,var(--aurora)); border-color:transparent; box-shadow:0 0 12px var(--rc,var(--aurora))}
  .build-row.on .check::after{content:""; position:absolute; left:6.5px; top:2.5px; width:5px; height:10px; border:solid #04140f; border-width:0 2.5px 2.5px 0; transform:rotate(45deg)}
  .build-row.base{cursor:default}
  .build-row.base .check{background:var(--rc,var(--aurora)); border-color:transparent; opacity:.55}
  .build-row.base .check::after{content:""; position:absolute; left:6.5px; top:2.5px; width:5px; height:10px; border:solid #04140f; border-width:0 2.5px 2.5px 0; transform:rotate(45deg)}
  .row-name{flex:1; font-size:15px; font-weight:500; letter-spacing:-.01em; color:var(--text)}
  .build-row:not(.on):not(.base) .row-name{color:var(--dim)}
  .row-tag{font-size:9px; font-family:var(--mono); letter-spacing:.1em; color:var(--faint); margin-left:7px; text-transform:uppercase}
  .row-val{display:flex; align-items:center; gap:3px; flex:0 0 auto}
  .row-val .cur{font-family:var(--mono); font-size:13px; color:var(--faint)}
  .row-val input{width:52px; text-align:right; background:transparent; border:none; border-bottom:1px solid var(--hair-2);
    color:var(--text); font-family:var(--mono); font-size:14px; padding:3px 2px; transition:.15s}
  .row-val input:focus{outline:none; border-bottom-color:var(--rc,var(--aurora))}
  .row-val .unit{font-family:var(--mono); font-size:11px; color:var(--faint); width:20px}

  /* Bottom tab bar */
  .tabbar{position:absolute; left:12px; right:12px; bottom:calc(env(safe-area-inset-bottom) + 12px); z-index:700;
    background:var(--glass); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    border:1px solid var(--hair); border-radius:24px; padding:7px; display:flex; box-shadow:0 14px 40px rgba(0,0,0,.55)}
  .tab{flex:1; border:none; background:none; cursor:pointer; padding:8px 0 7px; display:flex; flex-direction:column; align-items:center; gap:4px;
    color:var(--faint); font-family:var(--font); font-size:10.5px; font-weight:600; letter-spacing:.01em; border-radius:16px; transition:.16s}
  .tab svg{width:22px; height:22px}
  .tab.active{color:var(--text); background:rgba(255,255,255,.06)}
  .tab.active svg{color:var(--aurora); filter:drop-shadow(0 0 6px rgba(95,233,198,.5))}

  /* Editor sheet */
  .scrim{position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:800; opacity:0; pointer-events:none; transition:opacity .28s; -webkit-backdrop-filter:blur(2px); backdrop-filter:blur(2px)}
  .scrim.show{opacity:1; pointer-events:auto}
  .sheet{position:fixed; left:0; right:0; bottom:0; z-index:810; background:var(--glass-strong);
    -webkit-backdrop-filter:blur(30px) saturate(1.6); backdrop-filter:blur(30px) saturate(1.6);
    border-top:1px solid var(--hair-2); border-radius:26px 26px 0 0; box-shadow:0 -10px 50px rgba(0,0,0,.6);
    transform:translateY(100%); transition:transform .36s cubic-bezier(.32,.72,0,1); max-height:90dvh; display:flex; flex-direction:column; padding-bottom:env(safe-area-inset-bottom)}
  .sheet.open{transform:translateY(0)}
  .grip{width:38px; height:5px; background:var(--hair-2); border-radius:3px; margin:10px auto 2px; flex:0 0 auto}
  .sheet-body{overflow-y:auto; padding:8px 18px 20px}
  .sheet h2{font-size:21px; font-weight:600; letter-spacing:-.025em; margin:8px 0 16px}
  .field{margin-bottom:16px}
  .field > label{display:block; font-size:11px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); margin-bottom:8px}
  .field input[type=text], .field textarea{width:100%; border:1px solid var(--hair-2); border-radius:13px; padding:13px 14px; font-size:16px; font-family:var(--font); background:rgba(255,255,255,.04); color:var(--text); resize:vertical; transition:.15s}
  .field input[type=text]:focus, .field textarea:focus{outline:none; border-color:var(--aurora); box-shadow:0 0 0 3px rgba(95,233,198,.14)}
  .field input::placeholder, .field textarea::placeholder{color:var(--faint)}
  .field textarea{min-height:76px; line-height:1.45}
  .chips{display:flex; flex-wrap:wrap; gap:7px}
  .chip{border:1px solid var(--hair-2); background:rgba(255,255,255,.04); border-radius:999px; padding:8px 13px; font-size:13px; cursor:pointer; display:flex; align-items:center; gap:6px; color:var(--dim); transition:.15s}
  .chip.on{background:var(--aurora); color:#04140f; border-color:var(--aurora); box-shadow:0 0 18px rgba(95,233,198,.4)}
  .daychips{display:flex; gap:8px}
  .daychip{flex:1; border:1px solid var(--hair-2); background:rgba(255,255,255,.04); border-radius:13px; padding:11px 4px; font-size:13px; font-weight:600; cursor:pointer; text-align:center; color:var(--dim); transition:.15s}
  .daychip.on[data-day="1"]{background:rgba(95,233,198,.16); color:var(--aurora); border-color:var(--aurora); box-shadow:0 0 16px rgba(95,233,198,.22)}
  .daychip.on[data-day="2"]{background:rgba(95,233,198,.16); color:var(--aurora); border-color:var(--aurora); box-shadow:0 0 16px rgba(95,233,198,.22)}
  .daychip.on[data-day="3"]{background:rgba(95,233,198,.16); color:var(--aurora); border-color:var(--aurora); box-shadow:0 0 16px rgba(95,233,198,.22)}
  .coord{font-family:var(--mono); font-size:11px; color:var(--faint); margin-top:6px}
  .sheet-actions{display:flex; gap:10px; margin-top:8px}
  .btn{flex:1; border:none; border-radius:14px; padding:15px; font-size:15px; font-weight:600; cursor:pointer; font-family:var(--font); letter-spacing:-.01em; transition:.15s}
  .btn-save{background:linear-gradient(160deg,#74f0d4,#3ec7a6); color:#04140f; box-shadow:0 6px 24px rgba(79,214,180,.34)}
  .btn-del{flex:0 0 auto; padding:15px 20px; background:rgba(255,139,122,.1); color:#ff8b7a; border:1px solid rgba(255,139,122,.28)}
  .btn:active{transform:translateY(1px)}

  .popmenu{position:absolute; top:calc(env(safe-area-inset-top) + 56px); right:12px; z-index:900;
    background:var(--glass-strong); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    border:1px solid var(--hair-2); border-radius:16px; box-shadow:0 14px 40px rgba(0,0,0,.6); overflow:hidden; display:none; min-width:220px}
  .popmenu.show{display:block}
  .popmenu button{display:block; width:100%; text-align:left; background:none; border:none; padding:14px 16px; font-size:14px; cursor:pointer; font-family:var(--font); color:var(--text); border-bottom:1px solid var(--hair)}
  .popmenu button:last-child{border-bottom:none; color:#ff8b7a}
  .popmenu button:active{background:rgba(255,255,255,.06)}

  .leaflet-popup-content-wrapper{background:var(--glass-strong); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    color:var(--text); border:1px solid var(--hair-2); border-radius:16px; box-shadow:0 12px 40px rgba(0,0,0,.6)}
  .leaflet-popup-content{margin:12px 14px; font-family:var(--font)}
  .leaflet-popup-tip{background:var(--glass-strong)}
  .leaflet-popup-close-button{color:var(--faint)!important; padding:8px 8px 0 0!important}
  .lp-title{font-weight:600; font-size:15px; letter-spacing:-.01em; margin-bottom:3px}
  .lp-body{font-size:13px; color:var(--dim); line-height:1.4; margin-bottom:9px}
  .lp-edit{background:rgba(95,233,198,.14); color:var(--aurora); border:1px solid rgba(95,233,198,.3); border-radius:9px; padding:7px 13px; font-size:13px; font-weight:600; cursor:pointer}
</style>
</head>
<body>

  <section class="panel open" id="bikePanel">
    <div class="panel-body bike-body">

        <div class="hud">
          <div class="hud-tl">

          </div>

          <span class="reticle tl"></span><span class="reticle tr"></span><span class="reticle bl"></span><span class="reticle br"></span>
        </div>
        <div class="bike-caption">Trek Checkpoint ALR · wireframe</div>
        <div class="bike-hint">drag to rotate</div>

      <div class="build-scroll">

      </div>

    </div>
  </section>

  <section class="panel" id="notesPanel">
    <div class="panel-head"><h2>Route notes</h2><button class="icon-btn" id="closeNotes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>
    <div class="panel-body" id="notesList"></div>
  </section>

  <section class="panel" id="tripPanel">
    <div class="panel-head"><h2>Trip &amp; budget</h2><button class="icon-btn" id="closeTrip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>
    <div class="panel-body" id="tripBody"></div>
  </section>

  <section class="panel" id="kitPanel">
    <div class="panel-head"><h2>Packing kit</h2><button class="icon-btn" id="closeKit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>
    <div class="panel-body" id="kitBody"></div>
  </section>

  <nav class="tabbar">
    <button class="tab active" data-view="bike"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><circle cx="15" cy="5" r="1" fill="currentColor" stroke="none"/><path d="M12 17.5V14l-3-3 4-3 2 3h3"/></svg>Trek Star</button>
    <button class="tab" data-view="map"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-6-5.3-6-10a6 6 0 0 1 12 0c0 4.7-6 10-6 10Z"/><circle cx="12" cy="11" r="2.2"/></svg>Map</button>
    <button class="tab" data-view="notes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="16" rx="2.6"/><path d="M9 9h6M9 13h6M9 17h3"/></svg>Notes</button>
    <button class="tab" data-view="trip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><path d="M15.5 8.5 13 13l-4.5 2.5L11 11l4.5-2.5Z"/></svg>Trip</button>
    <button class="tab" data-view="kit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="7" width="12" height="13" rx="3.5"/><path d="M9 7V6a3 3 0 0 1 6 0v1"/><path d="M9.5 13.5h5"/></svg>Kit</button>
  </nav>

  <div class="scrim" id="scrim"></div>
  <div class="sheet" id="sheet">
    <div class="grip"></div>
    <div class="sheet-body">
      <h2 id="sheetTitle">New note</h2>
      <div class="field"><label>Title</label><input type="text" id="fTitle" placeholder="e.g. Café stop before the climb" /></div>
      <div class="field"><label>Category</label><div class="chips" id="catChips"></div></div>
      <div class="field"><label>Day</label><div class="daychips" id="dayChips">
        <button class="daychip" data-day="1">Day 1</button><button class="daychip" data-day="2">Day 2</button><button class="daychip" data-day="3">Day 3</button>
      </div></div>
      <div class="field"><label>Notes</label><textarea id="fBody" placeholder="Booked? Water? Steep climb? Anything to remember."></textarea><div class="coord" id="fCoord"></div></div>
      <div class="sheet-actions"><button class="btn btn-del" id="delBtn">Delete</button><button class="btn btn-save" id="saveBtn">Save note</button></div>
    </div>
  </div>

  <div class="popmenu" id="popMenu">
    <button id="fitAll">Zoom to whole route</button>
    <button id="resetRoute">Reset to original plan</button>
  </div>

  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  (function(){
    "use strict";
    var CATS = [
      {id:"stay", em:"📍", label:"Stay"},{id:"finish", em:"🏁", label:"Finish line"},
      {id:"food", em:"🍺", label:"Food & beer"},{id:"water", em:"💧", label:"Water"},
      {id:"view", em:"📷", label:"Viewpoint"},{id:"sight", em:"🏰", label:"Sight"},
      {id:"climb", em:"⛰️", label:"Climb"},{id:"forest", em:"🌲", label:"Forest / track"},
      {id:"warn", em:"⚠️", label:"Watch out"},{id:"repair", em:"🔧", label:"Bike / repair"},
      {id:"start", em:"🚩", label:"Start"},{id:"other", em:"📌", label:"Other"}
    ];
    function catEm(id){ for(var i=0;i<CATS.length;i++){ if(CATS[i].id===id) return CATS[i].em; } return "📌"; }
    function catLabel(id){ for(var i=0;i<CATS.length;i++){ if(CATS[i].id===id) return CATS[i].label; } return "Note"; }

    function seedNotes(){
      return [
        {id:"a1", day:1, cat:"stay", title:"Oban", lat:56.4152, lng:-5.4720, body:"Overnight after Fort William → Oban (~80 km). Accommodation £30 · food & beer £50. Coastal town and ferry port — good dinner options."},
        {id:"a2", day:2, cat:"stay", title:"Inveraray Hostel", lat:56.2340, lng:-5.0740, body:"Overnight after Oban → Inveraray (~75–85 km). Inveraray Hostel · £30 · food & beer £50. On the shore of Loch Fyne."},
        {id:"a3", day:3, cat:"finish", title:"Glasgow — Finish line", lat:55.8642, lng:-4.2518, body:"End of the ride! Inveraray → Glasgow (~75–85 km), arrive ~14:30. Then ~5 hr train home to London. Celebrate with food + a pint."}
      ];
    }
    var SCHEDULE = [
      {cls:"travel", day:"Thursday · Travel", leg:"London → Fort William", tags:["20:30 depart","overnight sleeper","10:00 arrive"], items:["Overnight train up to the Highlands.","Meal on board."]},
      {cls:"d1", day:"Friday · Day 1", leg:"Fort William → Oban", tags:["80 km","7 hrs","10:30–17:30"], items:["Ride through the dramatic valley of Glencoe.","Pass the famous Castle Stalker.","Coastal views as you approach Oban.","Stay: Oban."]},
      {cls:"d2", day:"Saturday · Day 2", leg:"Oban → Inveraray", tags:["75–85 km","6 hrs","from 8:30"], items:["Follow the shores of Loch Awe.","Stop at Kilchurn Castle.","Rolling roads with very little traffic.","Stay: Inveraray Hostel."]},
      {cls:"d3", day:"Sunday · Day 3", leg:"Inveraray → Glasgow", tags:["75–85 km","6 hrs","8:30–14:30"], items:["Cycle through Loch Lomond & The Trossachs.","Optional stop in Luss.","Reach Glasgow, then ~5 hr train to London (arrive ~20:00)."]}
    ];
    var BUDGET = [
      {cat:"Travel", rows:[["Train (Glasgow Queen Street)",80],["Meal",16],["Train back (from Fort William)",50]]},
      {cat:"Accommodation", rows:[["Oban",30],["Inveraray Hostel",30]]},
      {cat:"Food & drink", rows:[["Friday — food & beer",50],["Saturday — food & beer",50],["Sunday — food & beer",50]]}
    ];
    function seedKit(){
      var raw=[["Bike & repair","Spare tubes ×2"],["Bike & repair","Tyre levers"],["Bike & repair","Mini pump"],["Bike & repair","Multi-tool"],["Bike & repair","Chain lube"],["Bike & repair","Puncture patches"],["Bike & repair","Spare brake pads"],["Bike & repair","Zip ties + tape"],["Luggage","Panniers / bikepacking bags"],["Luggage","Handlebar bag"],["Luggage","Dry bags"],["Luggage","Bungees / straps"],["Clothing","Waterproof jacket"],["Clothing","Waterproof trousers"],["Clothing","Warm layer / fleece"],["Clothing","Base layers"],["Clothing","Evening / off-bike clothes"],["Clothing","Spare socks ×2"],["Clothing","Gloves"],["Clothing","Buff / hat"],["Clothing","Off-bike shoes"],["Nav & tech","Phone + this map"],["Nav & tech","Power bank"],["Nav & tech","Charging cables"],["Nav & tech","Front + rear lights"],["Nav & tech","Cash + card"],["Health & body","Midge repellent"],["Health & body","Sun cream"],["Health & body","Chamois cream"],["Health & body","First aid kit"],["Health & body","Painkillers"],["Health & body","Water bottles"],["Health & body","Snacks"],["Overnight (hostel/B&B)","Sleeping bag liner"],["Overnight (hostel/B&B)","Travel towel"],["Overnight (hostel/B&B)","Toiletries"],["Overnight (hostel/B&B)","Earplugs"],["Travel & docs","Train tickets (out + back)"],["Travel & docs","Bike reservation for train"],["Travel & docs","ID"]];
      return raw.map(function(k,i){ return {id:"k"+i, cat:k[0], item:k[1], done:false}; });
    }
    var KIT_ORDER=["Bike & repair","Luggage","Clothing","Nav & tech","Health & body","Overnight (hostel/B&B)","Travel & docs"];

    var BIKE_BASE={ id:"bike", name:"Trek Checkpoint ALR", weight:10.5, cost:1400 };
    var ITEMS=[
      {id:"handlebar", name:"Handlebar roll", weight:2.2},
      {id:"frame", name:"Frame bag", weight:1.6},
      {id:"topTube", name:"Top-tube bag", weight:0.5},
      {id:"stemBag", name:"Stem bag", weight:0.6},
      {id:"seat", name:"Seat pack", weight:2.8},
      {id:"pannierRack", name:"Pannier rack", weight:0.9},
      {id:"sidePanniers", name:"Side panniers", weight:5.0},
      {id:"rackTopBag", name:"Rack-top bag", weight:1.8},
      {id:"bottleCage", name:"Bottle cage", weight:0.9},
      {id:"frontMudguard", name:"Front mudguard", weight:0.3},
      {id:"rearMudguard", name:"Rear mudguard", weight:0.3}
    ];
    var THEME={ weight:0x5fe9c6, cost:0x7cff6b };
    var viewMode="weight", build={bike:{}, items:{}}, themeMats=[];

    var APP_ID="west-highland-ride";
    var supa=(window.SUPABASE_URL && window.SUPABASE_ANON_KEY && window.supabase)
      ? window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY) : null;

    var mem={};
    function lsGet(k){ try{ var v=window.localStorage.getItem(k); return v==null?undefined:JSON.parse(v);}catch(e){ return undefined; } }
    function lsSet(k,v){ try{ window.localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
    function fallback(key,def){ var v=lsGet(key); if(v!==undefined) return v; if(key in mem) return mem[key]; return def; }
    var store={
      get:function(key,def){
        if(supa){
          return supa.from('app_kv').select('value').eq('app',APP_ID).eq('key',key).maybeSingle()
            .then(function(res){ return (res && res.data && res.data.value!=null) ? res.data.value : fallback(key,def); })
            .catch(function(){ return fallback(key,def); });
        }
        if(window.storage && window.storage.get){ return window.storage.get(key).then(function(r){ return (r&&r.value!=null)?JSON.parse(r.value):fallback(key,def); }).catch(function(){ return fallback(key,def); }); }
        return Promise.resolve(fallback(key,def));
      },
      set:function(key,val){
        mem[key]=val; lsSet(key,val);
        if(supa){ supa.from('app_kv').upsert({app:APP_ID, key:key, value:val, updated_at:new Date().toISOString()}).then(function(){}).catch(function(){}); }
        try{ if(window.storage&&window.storage.set){ window.storage.set(key, JSON.stringify(val)).catch(function(){}); } }catch(e){}
      }
    };
    var K_NOTES="whr2:notes", K_KIT="whr:kit", K_BUILD="whr:build", K_BAGS="whr:bags";

    var notes=[], kit=[], filterDay="all", editingId=null, addMode=false, draft=null, currentView="bike";
    var map, markerLayer={}, dayLayers={};
    var bikeInited=false, bikeRenderer, bikeScene, bikeCamera, bikeGroup, bikePoints, bikeBagMeshes={};
    var bikeDrag={active:false,lastX:0,lastY:0};
    var DAY_COLORS={1:"#5fe9c6",2:"#5fe9c6",3:"#5fe9c6"};

    function initMap(){
      map=L.map('map',{zoomControl:false, attributionControl:true}).setView([56.4,-4.9],8);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
        maxZoom:19, attribution:'© OpenStreetMap'
      }).addTo(map);
      map.on('click', onMapClick);
    }
    function pinIcon(n){ return L.divIcon({className:'', html:'<div class="pin d'+n.day+'"><div class="halo"></div><div class="core"><span>'+catEm(n.cat)+'</span></div></div>', iconSize:[30,30], iconAnchor:[15,15], popupAnchor:[0,-16]}); }

    function renderMap(){
      Object.keys(markerLayer).forEach(function(id){ map.removeLayer(markerLayer[id]); }); markerLayer={};
      [1,2,3].forEach(function(d){ if(dayLayers[d]){ dayLayers[d].forEach(function(l){ map.removeLayer(l); }); dayLayers[d]=null; } });
      [1,2,3].forEach(function(d){
        if(filterDay!=="all" && String(d)!==filterDay) return;
        var pts=notes.filter(function(n){return n.day===d;}).map(function(n){return [n.lat,n.lng];});
        if(pts.length>1){
          var glow=L.polyline(pts,{color:DAY_COLORS[d], weight:10, opacity:.16, lineCap:"round", lineJoin:"round"}).addTo(map);
          var line=L.polyline(pts,{color:DAY_COLORS[d], weight:2.5, opacity:.95, lineCap:"round", lineJoin:"round"}).addTo(map);
          dayLayers[d]=[glow,line];
        }
      });
      notes.forEach(function(n){
        if(filterDay!=="all" && String(n.day)!==filterDay) return;
        var m=L.marker([n.lat,n.lng],{icon:pinIcon(n), draggable:true}).addTo(map);
        m.on('click', function(){ openPopup(n,m); });
        m.on('dragend', function(e){ var p=e.target.getLatLng(); n.lat=+p.lat.toFixed(5); n.lng=+p.lng.toFixed(5); persistNotes(); renderMap(); });
        markerLayer[n.id]=m;
      });
    }
    function openPopup(n,m){
      var html='<div class="lp-title">'+catEm(n.cat)+' '+esc(n.title)+'</div>'+(n.body?'<div class="lp-body">'+esc(n.body)+'</div>':'')+'<button class="lp-edit" data-edit="'+n.id+'">Edit note</button>';
      m.bindPopup(html).openPopup();
      setTimeout(function(){ var b=document.querySelector('[data-edit="'+n.id+'"]'); if(b) b.onclick=function(){ m.closePopup(); openEditor(n); }; },30);
    }
    function fitAll(){ var pts=notes.map(function(n){return [n.lat,n.lng];}); if(pts.length) map.fitBounds(L.latLngBounds(pts).pad(0.16)); }
    function onMapClick(e){ if(!addMode) return; setAddMode(false); var day=filterDay==="all"?1:parseInt(filterDay,10); openEditor({id:null,day:day,cat:"other",title:"",body:"",lat:+e.latlng.lat.toFixed(5),lng:+e.latlng.lng.toFixed(5)}); }

    function openEditor(n){
      draft={id:n.id,day:n.day,cat:n.cat,title:n.title,body:n.body,lat:n.lat,lng:n.lng}; editingId=n.id;
      document.getElementById('sheetTitle').textContent=n.id?"Edit note":"New note";
      document.getElementById('fTitle').value=n.title||"";
      document.getElementById('fBody').value=n.body||"";
      document.getElementById('fCoord').textContent="📍 "+n.lat.toFixed(5)+", "+n.lng.toFixed(5)+"  ·  drag the pin on the map to move";
      document.getElementById('delBtn').style.display=n.id?"block":"none";
      buildCatChips(); buildDayChips(); showSheet(true);
    }
    function buildCatChips(){ var w=document.getElementById('catChips'); w.innerHTML=""; CATS.forEach(function(c){ var b=document.createElement('button'); b.className="chip"+(draft.cat===c.id?" on":""); b.innerHTML='<span>'+c.em+'</span>'+c.label; b.onclick=function(){ draft.cat=c.id; buildCatChips(); }; w.appendChild(b); }); }
    function buildDayChips(){ document.querySelectorAll('#dayChips .daychip').forEach(function(b){ b.classList.toggle('on', parseInt(b.dataset.day,10)===draft.day); b.onclick=function(){ draft.day=parseInt(b.dataset.day,10); buildDayChips(); }; }); }
    function saveNote(){
      draft.title=document.getElementById('fTitle').value.trim()||"Untitled note";
      draft.body=document.getElementById('fBody').value.trim();
      if(draft.id){ for(var i=0;i<notes.length;i++){ if(notes[i].id===draft.id){ notes[i]=Object.assign(notes[i],draft); break; } } }
      else { draft.id="n"+Date.now(); notes.push(Object.assign({},draft)); }

    function addTube(group, p1, p2, radius){
      var start=new THREE.Vector3(p1[0],p1[1],p1[2]||0), end=new THREE.Vector3(p2[0],p2[1],p2[2]||0);
      var dir=new THREE.Vector3().subVectors(end,start);
      var len=dir.length();
      var geo=new THREE.CylinderGeometry(radius,radius,len,10,1,false);
      var mat=new THREE.MeshBasicMaterial({color:THEME[viewMode], wireframe:true, transparent:true, opacity:.85});
      themeMats.push(mat);
      var mesh=new THREE.Mesh(geo,mat);
      mesh.position.copy(new THREE.Vector3().addVectors(start,end).multiplyScalar(.5));
      var quat=new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0), dir.clone().normalize());
      mesh.setRotationFromQuaternion(quat);
      group.add(mesh);
      return mesh;
    }
    function frameMat(op){ var m=new THREE.MeshBasicMaterial({color:THEME[viewMode],wireframe:true,transparent:true,opacity:op}); themeMats.push(m); return m; }
    function buildBikeFrame(group){
      var pts = {
        rearHub:[-1.4,0,0], frontHub:[1.4,0,0],
        bb:[-0.55,0.05,0], seatTop:[-0.75,1.15,0],
        headBottom:[1.05,0.95,0], headTop:[1.2,1.38,0],
        saddle:[-0.82,1.32,0], barEnd:[1.42,1.42,0]
      };
      [pts.rearHub, pts.frontHub].forEach(function(c){
        var torus=new THREE.Mesh(new THREE.TorusGeometry(0.62,0.035,8,28), frameMat(.8));
        torus.position.set(c[0],c[1],c[2]); group.add(torus);
        var sMat=new THREE.LineBasicMaterial({color:THEME[viewMode], transparent:true, opacity:.35}); themeMats.push(sMat);
        for(var i=0;i<8;i++){
          var a=i/8*Math.PI*2;
          var g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(c[0],c[1],c[2]), new THREE.Vector3(c[0]+Math.cos(a)*0.6, c[1]+Math.sin(a)*0.6, c[2])]);
          group.add(new THREE.Line(g,sMat));
        }
      });
      var ring=new THREE.Mesh(new THREE.TorusGeometry(0.26,0.02,6,20), frameMat(.8));
      ring.position.set(pts.bb[0],pts.bb[1],pts.bb[2]); group.add(ring);
      addTube(group, pts.bb, pts.seatTop, 0.045);
      addTube(group, pts.bb, pts.headBottom, 0.045);
      addTube(group, pts.seatTop, pts.headTop, 0.04);
      addTube(group, pts.seatTop, pts.rearHub, 0.035);
      addTube(group, pts.bb, pts.rearHub, 0.035);
      addTube(group, pts.headBottom, pts.headTop, 0.05);
      addTube(group, pts.headBottom, pts.frontHub, 0.04);
      addTube(group, pts.seatTop, pts.saddle, 0.03);
      addTube(group, pts.headTop, pts.barEnd, 0.03);
      var saddle=new THREE.Mesh(new THREE.BoxGeometry(0.32,0.06,0.14), frameMat(.85));
      saddle.position.set(pts.saddle[0]-0.05,pts.saddle[1]+0.03,0); group.add(saddle);
      var bar=new THREE.Mesh(new THREE.TorusGeometry(0.16,0.02,6,16,Math.PI*1.4), frameMat(.85));
      bar.position.set(pts.barEnd[0],pts.barEnd[1]-0.05,0); bar.rotation.z=Math.PI*0.15; group.add(bar);
      bikePoints = pts;
    }
    function mkBagGroup(parts){
      var group=new THREE.Group();
      group.visible=false;
      group.scale.set(0.001,0.001,0.001);
      parts.forEach(function(p){
        var mat=new THREE.MeshBasicMaterial({color:THEME[viewMode], wireframe:true, transparent:true, opacity:0}); themeMats.push(mat);
        var mesh=new THREE.Mesh(p.geo, mat);
        mesh.position.set(p.pos[0],p.pos[1],p.pos[2]||0);
        if(p.rot) mesh.rotation.set(p.rot[0]||0,p.rot[1]||0,p.rot[2]||0);
        group.add(mesh);
      });
      return group;
    }
    function buildBagMeshes(group){
      var pts=bikePoints, m={};
      m.handlebar = mkBagGroup([{geo:new THREE.CylinderGeometry(0.15,0.15,0.5,14), pos:[pts.barEnd[0]-0.02,pts.barEnd[1]-0.16,0], rot:[0,0,Math.PI/2]}]);
      m.frame = mkBagGroup([{geo:new THREE.BoxGeometry(0.7,0.3,0.38), pos:[(pts.bb[0]+pts.headBottom[0])/2+0.05,(pts.bb[1]+pts.seatTop[1])/2+0.08,0], rot:[0,0,0.16]}]);
      m.topTube = mkBagGroup([{geo:new THREE.BoxGeometry(0.26,0.15,0.2), pos:[(pts.seatTop[0]+pts.headTop[0])/2-0.1,(pts.seatTop[1]+pts.headTop[1])/2+0.12,0], rot:[0,0,0.1]}]);
      m.seat = mkBagGroup([{geo:new THREE.CylinderGeometry(0.15,0.2,0.62,14), pos:[pts.saddle[0]-0.35, pts.saddle[1]-0.05,0], rot:[0,0,-1.15]}]);
      m.stemBag = mkBagGroup([{geo:new THREE.BoxGeometry(0.22,0.2,0.2), pos:[pts.headTop[0]+0.08, pts.headTop[1]-0.02, 0]}]);
      var rackX=pts.rearHub[0]-0.08, rackY=pts.rearHub[1]+0.72;
      m.pannierRack = mkBagGroup([{geo:new THREE.BoxGeometry(0.55,0.05,0.34), pos:[rackX, rackY, 0]}]);
      m.rackTopBag = mkBagGroup([{geo:new THREE.BoxGeometry(0.34,0.2,0.26), pos:[rackX, rackY+0.16, 0]}]);
      m.sidePanniers = mkBagGroup([
        {geo:new THREE.BoxGeometry(0.3,0.4,0.2), pos:[pts.rearHub[0]-0.02, pts.rearHub[1]+0.06, 0.34]},
        {geo:new THREE.BoxGeometry(0.3,0.4,0.2), pos:[pts.rearHub[0]-0.02, pts.rearHub[1]+0.06, -0.34]}
      ]);
      m.bottleCage = mkBagGroup([{geo:new THREE.CylinderGeometry(0.09,0.09,0.42,12,1,true), pos:[(pts.bb[0]+pts.seatTop[0])/2, (pts.bb[1]+pts.seatTop[1])/2+0.05, 0.12]}]);
      m.frontMudguard = mkBagGroup([{geo:new THREE.TorusGeometry(0.68,0.015,6,20,2.3), pos:[pts.frontHub[0],pts.frontHub[1],0], rot:[0,0,0.42]}]);
      m.rearMudguard = mkBagGroup([{geo:new THREE.TorusGeometry(0.68,0.015,6,20,2.3), pos:[pts.rearHub[0],pts.rearHub[1],0], rot:[0,0,0.42]}]);
      Object.keys(m).forEach(function(k){ group.add(m[k]); });
      return m;
    }
    function initBikeScene(){
      if(bikeInited) return; bikeInited=true;
      var canvas=document.getElementById('bikeCanvas');
      if(!canvas || typeof THREE==="undefined") return;
      bikeRenderer=new THREE.WebGLRenderer({canvas:canvas, alpha:true, antialias:true});
      bikeRenderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
      bikeScene=new THREE.Scene();

      bikeCamera.position.set(0,1.05,5.6);
      bikeCamera.lookAt(0,0.55,0);

      bikeGroup.position.y=-0.55;
      bikeScene.add(bikeGroup);

    function updateBikeSize(){

    function attachBikeDrag(canvas){
      canvas.addEventListener('pointerdown', function(e){ bikeDrag.active=true; bikeDrag.lastX=e.clientX; bikeDrag.lastY=e.clientY; try{canvas.setPointerCapture(e.pointerId);}catch(err){} });
      canvas.addEventListener('pointermove', function(e){
        if(!bikeDrag.active) return;
        var dx=e.clientX-bikeDrag.lastX, dy=e.clientY-bikeDrag.lastY;
        bikeDrag.lastX=e.clientX; bikeDrag.lastY=e.clientY;
        bikeGroup.rotation.y += dx*0.008;
        bikeGroup.rotation.x = Math.max(-0.35, Math.min(0.35, bikeGroup.rotation.x + dy*0.006));
      });
      ['pointerup','pointerleave','pointercancel'].forEach(function(ev){ canvas.addEventListener(ev, function(){ bikeDrag.active=false; }); });
    }
    function animateBike(){
      requestAnimationFrame(animateBike);
      if(bikeRenderer && currentView==="bike"){ bikeRenderer.render(bikeScene, bikeCamera); }
    }
    function animateBagMesh(obj, show){
      if(!obj) return;
      var start=performance.now(), dur=380;
      var fromScale=obj.scale.x, toScale=show?1:0.001;
      var kids=(obj.children && obj.children.length)?obj.children:[obj];
      var fromOps=kids.map(function(c){ return c.material?c.material.opacity:0; });
      var toOpacity=show?0.85:0;
      if(show) obj.visible=true;
      (function step(t){
        var p=Math.min(1,(t-start)/dur);
        var e=1-Math.pow(1-p,3);
        var s=fromScale+(toScale-fromScale)*e;
        obj.scale.set(s,s,s);
        kids.forEach(function(c,i){ if(c.material) c.material.opacity=fromOps[i]+(toOpacity-fromOps[i])*e; });
        if(p<1) requestAnimationFrame(step); else if(!show) obj.visible=false;
      })(start);
    }

    // ---- build state ----
    function itemDef(id){ if(id==="bike") return BIKE_BASE; for(var i=0;i<ITEMS.length;i++){ if(ITEMS[i].id===id) return ITEMS[i]; } return null; }
    function seedBuild(){
      build={ bike:{ weight:BIKE_BASE.weight, cost:BIKE_BASE.cost }, items:{} };
      ITEMS.forEach(function(it){ build.items[it.id]={ on:false, weight:it.weight, cost:0 }; });
    }
    function normalizeBuild(){
      if(!build || !build.items){ seedBuild(); return; }
      if(!build.bike) build.bike={ weight:BIKE_BASE.weight, cost:BIKE_BASE.cost };
      ITEMS.forEach(function(it){
        var e=build.items[it.id];
        if(!e) build.items[it.id]={ on:false, weight:it.weight, cost:0 };
        else { if(typeof e.weight!=="number") e.weight=it.weight; if(typeof e.cost!=="number") e.cost=0; e.on=!!e.on; }
      });
    }
    function persistBuild(){ build.mode=viewMode; store.set(K_BUILD, build); }

    function setMode(mode){
      if(mode===viewMode) return;

    function fmt(mode,v){ return mode==="cost" ? Math.round(v).toLocaleString() : (Math.round(v*10)/10).toFixed(1); }
    function computeTotal(){
      var t = viewMode==="cost" ? (build.bike.cost||0) : (build.bike.weight||0);
      ITEMS.forEach(function(it){ var e=build.items[it.id]; if(e.on) t += (viewMode==="cost"? (e.cost||0) : (e.weight||0)); });

    function renderBuild(){

    function buildRow(o, cur, unit, rc){
      var row=document.createElement('div');
      row.className="build-row"+(o.base?" base":"")+(o.on?" on":"");
      row.style.setProperty('--rc', rc);
      var check=document.createElement('span'); check.className="check";
      var name=document.createElement('span'); name.className="row-name"; name.textContent=o.name;
      if(o.base){ var tag=document.createElement('span'); tag.className="row-tag"; tag.textContent="the bike"; name.appendChild(tag); }
      var val=document.createElement('span'); val.className="row-val";
      if(cur){ var c=document.createElement('span'); c.className="cur"; c.textContent=cur; val.appendChild(c); }
      var input=document.createElement('input');
      input.type="number"; input.inputMode="decimal"; input.min="0"; input.step=(viewMode==="cost"?"1":"0.1");
      input.value=(o.val!=null? (viewMode==="cost"? Math.round(o.val) : o.val) : 0);
      input.onclick=function(e){ e.stopPropagation(); };
      input.onchange=function(){
        var num=parseFloat(input.value)||0; if(num<0) num=0;
        if(o.base){ build.bike[viewMode==="cost"?"cost":"weight"]=num; }
        else { build.items[o.id][viewMode==="cost"?"cost":"weight"]=num; }
        persistBuild(); updateHud();
        var totalEl=document.getElementById('loadoutTotal');
        if(totalEl) totalEl.innerHTML='<span>'+(viewMode==="cost"?"Total cost":"Total weight")+'</span><span class="amt">'+cur+fmt(viewMode,computeTotal())+(unit?' '+unit:'')+'</span>';
      };
      val.appendChild(input);
      if(unit){ var u=document.createElement('span'); u.className="unit"; u.textContent=unit; val.appendChild(u); }
      row.appendChild(check); row.appendChild(name); row.appendChild(val);
      if(!o.base){ row.onclick=function(){ toggleItem(o.id); }; }
      return row;
    }
    function updateHud(){

      document.getElementById('hudSub').textContent="TREK STAR · "+mounted+" MODULE"+(mounted===1?"":"S");

      document.getElementById('saveBtn').onclick=saveNote;
      document.getElementById('delBtn').onclick=deleteNote;
      document.getElementById('scrim').onclick=function(){ showSheet(false); };
      var pop=document.getElementById('popMenu');
      document.getElementById('menuBtn').onclick=function(e){ e.stopPropagation(); pop.classList.toggle('show'); };
      document.addEventListener('click', function(e){ if(!pop.contains(e.target) && e.target.id!=="menuBtn") pop.classList.remove('show'); });
      document.getElementById('fitAll').onclick=function(){ pop.classList.remove('show'); setView('map'); setTimeout(fitAll,80); };
      document.getElementById('resetRoute').onclick=function(){ pop.classList.remove('show'); if(confirm("Reset to the original plan? This removes your custom notes and pin moves.")){ notes=seedNotes(); persistNotes(); renderMap(); renderNotes(); fitAll(); } };
    }

    (function(){ var sub=document.querySelector('.brand .sub'); if(sub){ sub.innerHTML += supa ? ' &middot; <span style="color:var(--aurora)">&#9729; synced</span>' : ' &middot; <span style="color:var(--faint)">local only</span>'; } })();
    seedBuild();
    initMap(); wire(); renderBuild(); initBikeScene();
    Promise.all([ store.get(K_NOTES,null), store.get(K_KIT,null), store.get(K_BUILD,null), store.get(K_BAGS,null) ]).then(function(res){
      notes=res[0]||seedNotes(); kit=res[1]||seedKit();
      if(!res[0]) persistNotes(); if(!res[1]) persistKit();
      if(res[2]){ build=res[2]; normalizeBuild(); if(build.mode==="cost") viewMode="cost"; }
      else if(res[3]){ Object.keys(res[3]).forEach(function(id){ if(build.items[id]) build.items[id].on=!!res[3][id]; }); persistBuild(); }
      document.querySelectorAll('#modeToggle button').forEach(function(b){ b.classList.toggle('active', b.dataset.mode===viewMode); });
      applyTheme();
      renderMap(); fitAll();
      ITEMS.forEach(function(it){ if(build.items[it.id] && build.items[it.id].on && bikeBagMeshes[it.id]) animateBagMesh(bikeBagMeshes[it.id], true); });
      renderBuild();
      updateBikeSize();
    });
  })();
  </script>
</body>
</html>
